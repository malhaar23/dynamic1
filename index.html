<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login / Sign Up — Supabase</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 20px;
  }
  .card {
    background: #fff;
    width: 100%;
    max-width: 420px;
    border-radius: 16px;
    padding: 36px 32px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  }
  h2 { text-align: center; margin-bottom: 24px; color: #333; }
  .tabs { display: flex; margin-bottom: 24px; border-bottom: 2px solid #eee; }
  .tab {
    flex: 1;
    text-align: center;
    padding: 12px;
    cursor: pointer;
    color: #999;
    font-weight: 600;
    transition: 0.2s;
  }
  .tab.active { color: #667eea; border-bottom: 3px solid #667eea; margin-bottom: -2px; }
  .form { display: none; }
  .form.active { display: block; }
  label { display: block; margin: 12px 0 6px; color: #555; font-size: 14px; }
  input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: border 0.2s;
  }
  input:focus { border-color: #667eea; }
  button {
    width: 100%;
    padding: 13px;
    margin-top: 20px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s;
  }
  button:hover { transform: translateY(-2px); }
  button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .msg { margin-top: 14px; text-align: center; font-size: 14px; min-height: 18px; }
  .msg.error { color: #e74c3c; }
  .msg.success { color: #27ae60; }

  .welcome { text-align: center; }
  .welcome .avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 700;
    margin: 0 auto 18px;
  }
  .welcome h2 { color: #333; }
  .welcome .info {
    background: #f7f7fb;
    border-radius: 10px;
    padding: 18px;
    margin: 20px 0;
    text-align: left;
  }
  .welcome .info p { margin: 8px 0; color: #444; }
  .welcome .info strong { color: #667eea; }
  .badge {
    display: inline-block;
    background: #e8f5e9;
    color: #2e7d32;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
    margin-bottom: 12px;
  }
</style>
</head>
<body>
  <div class="card" id="authCard">
    <div style="text-align:center;"><span class="badge">Powered by Supabase</span></div>
    <div class="tabs">
      <div class="tab active" data-tab="login">Login</div>
      <div class="tab" data-tab="signup">Sign Up</div>
    </div>

    <form class="form active" id="loginForm">
      <h2>Welcome Back</h2>
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" required />
      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" required />
      <button type="submit" id="loginBtn">Login</button>
      <div class="msg" id="loginMsg"></div>
    </form>

    <form class="form" id="signupForm">
      <h2>Create Account</h2>
      <label for="signupName">Username</label>
      <input type="text" id="signupName" required />
      <label for="signupEmail">Email</label>
      <input type="email" id="signupEmail" required />
      <label for="signupPassword">Password</label>
      <input type="password" id="signupPassword" required minlength="4" />
      <button type="submit" id="signupBtn">Sign Up</button>
      <div class="msg" id="signupMsg"></div>
    </form>
  </div>

  <div class="card welcome" id="welcomeCard" style="display:none;">
    <div class="avatar" id="userInitial">?</div>
    <h2>Welcome, <span id="userName"></span>!</h2>
    <div class="info">
      <p><strong>Username:</strong> <span id="displayName"></span></p>
      <p><strong>Email:</strong> <span id="displayEmail"></span></p>
    </div>
    <p style="font-size:12px;color:#888;">Loaded from Supabase database</p>
    <button id="logoutBtn">Logout</button>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  // ----- Supabase connection settings -----
  const SUPABASE_URL = 'https://kmaocriozssleperewdw.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_s832F-Dbv5SdHl9GOlbYwA_-8QZoozi';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ----- Tab switching -----
  const tabs = document.querySelectorAll('.tab');
  const forms = document.querySelectorAll('.form');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      forms.forEach(f => f.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
      document.getElementById('loginMsg').textContent = '';
      document.getElementById('signupMsg').textContent = '';
    });
  });

  // ----- Sign Up: insert a new row into Supabase -----
  document.getElementById('signupForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('signupBtn');
    const msg = document.getElementById('signupMsg');
    const username = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim().toLowerCase();
    const password = document.getElementById('signupPassword').value;

    btn.disabled = true;
    msg.className = 'msg';
    msg.textContent = 'Creating account...';

    const { error } = await supabase
      .from('app_users')
      .insert({ username, email, password });

    btn.disabled = false;

    if (error) {
      msg.className = 'msg error';
      if (error.code === '23505') {
        msg.textContent = 'An account with that email already exists.';
      } else {
        msg.textContent = 'Error: ' + error.message;
      }
      return;
    }

    msg.className = 'msg success';
    msg.textContent = 'Account created! You can now log in.';
    document.getElementById('signupForm').reset();
    setTimeout(() => {
      document.querySelector('.tab[data-tab="login"]').click();
      document.getElementById('loginEmail').value = email;
    }, 900);
  });

  // ----- Login: look up the row in Supabase -----
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const msg = document.getElementById('loginMsg');
    const email = document.getElementById('loginEmail').value.trim().toLowerCase();
    const password = document.getElementById('loginPassword').value;

    btn.disabled = true;
    msg.className = 'msg';
    msg.textContent = 'Logging in...';

    const { data, error } = await supabase
      .from('app_users')
      .select('id, username, email, password')
      .eq('email', email)
      .maybeSingle();

    btn.disabled = false;

    if (error) {
      msg.className = 'msg error';
      msg.textContent = 'Error: ' + error.message;
      return;
    }
    if (!data || data.password !== password) {
      msg.className = 'msg error';
      msg.textContent = 'Invalid email or password.';
      return;
    }

    // Save a small token so the user stays logged in on refresh
    sessionStorage.setItem('currentUser', JSON.stringify({
      id: data.id, username: data.username, email: data.email
    }));
    showWelcome(data);
  });

  function showWelcome(user) {
    document.getElementById('authCard').style.display = 'none';
    document.getElementById('welcomeCard').style.display = 'block';
    document.getElementById('userName').textContent = user.username;
    document.getElementById('displayName').textContent = user.username;
    document.getElementById('displayEmail').textContent = user.email;
    document.getElementById('userInitial').textContent = user.username.charAt(0).toUpperCase();
  }

  document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('currentUser');
    document.getElementById('welcomeCard').style.display = 'none';
    document.getElementById('authCard').style.display = 'block';
    document.getElementById('loginForm').reset();
  });

  // If user already logged in this session, restore the welcome screen
  const current = JSON.parse(sessionStorage.getItem('currentUser') || 'null');
  if (current) showWelcome(current);
</script>
</body>
</html>
