<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dynamic1 — Social Status App</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 20px;
  }
  .center { display: flex; align-items: center; justify-content: center; min-height: 90vh; }
  .card {
    background: #fff; width: 100%; max-width: 460px;
    border-radius: 16px; padding: 32px 28px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  }
  h2 { text-align: center; margin-bottom: 20px; color: #333; }
  h3 { color: #444; margin: 0; font-size: 16px; }
  .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee; }
  .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; color: #999; font-weight: 600; transition: 0.2s; }
  .tab.active { color: #667eea; border-bottom: 3px solid #667eea; margin-bottom: -2px; }
  .form { display: none; }
  .form.active { display: block; }
  label { display: block; margin: 12px 0 6px; color: #555; font-size: 14px; }
  input, textarea {
    width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 15px; outline: none; transition: border 0.2s; font-family: inherit;
  }
  textarea { resize: vertical; min-height: 70px; }
  input:focus, textarea:focus { border-color: #667eea; }
  button {
    padding: 11px 18px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: transform 0.15s;
  }
  button.full { width: 100%; padding: 13px; margin-top: 18px; font-size: 16px; }
  button:hover { transform: translateY(-2px); }
  button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  button.small { padding: 6px 12px; font-size: 13px; }
  button.tiny { padding: 4px 10px; font-size: 12px; }
  button.secondary { background: #fff; color: #667eea; border: 2px solid #667eea; }
  button.danger { background: #e74c3c; }
  button.success { background: #27ae60; }
  button.ghost { background: transparent; color: #667eea; padding: 4px 8px; font-size: 13px; }
  .msg { margin-top: 12px; text-align: center; font-size: 14px; min-height: 18px; }
  .msg.error { color: #e74c3c; }
  .msg.success { color: #27ae60; }
  .badge { display: inline-block; background: #e8f5e9; color: #2e7d32; font-size: 12px; padding: 4px 10px; border-radius: 12px; }
  .edited-tag { font-size: 11px; color: #888; font-style: italic; margin-left: 6px; }

  /* App shell */
  .app { max-width: 720px; margin: 0 auto; }
  .topbar {
    background: #fff; border-radius: 14px; padding: 16px 20px; margin-bottom: 18px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    display: flex; justify-content: space-between; align-items: center;
  }
  .topbar .me { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 18px;
  }
  .avatar.sm { width: 34px; height: 34px; font-size: 14px; }
  .avatar.xs { width: 26px; height: 26px; font-size: 12px; }
  .topbar h3 { font-size: 16px; }
  .topbar small { color: #888; font-size: 12px; }

  .section {
    background: #fff; border-radius: 14px; padding: 20px;
    margin-bottom: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }
  .section-head { display:flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .section-head .count { background:#eef; color:#667eea; font-size: 12px; padding: 3px 10px; border-radius: 10px; font-weight: 600; }

  /* Status card */
  .status-card {
    background: #f7f7fb; border-radius: 12px; padding: 14px;
    margin-bottom: 12px;
  }
  .status-top { display: flex; align-items: center; gap: 12px; }
  .status-top .body { flex: 1; }
  .status-top .name { font-weight: 600; color: #333; font-size: 14px; }
  .status-top .meta { font-size: 12px; color: #888; margin-top: 2px; }
  .status-content { color: #444; font-size: 14px; margin: 10px 0; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .status-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .like-btn, .comment-btn {
    background: #fff; color: #555; border: 1px solid #ddd;
    padding: 5px 12px; border-radius: 20px; font-size: 13px;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-weight: 600;
    transition: 0.15s;
  }
  .like-btn.liked { background: #ffe6ec; color: #e91e63; border-color: #ffb3c5; }
  .like-btn:hover, .comment-btn:hover { transform: translateY(-1px); }
  .comments-area { margin-top: 10px; border-top: 1px solid #e8e8f0; padding-top: 10px; display: none; }
  .comments-area.open { display: block; }
  .comment {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 8px 0;
  }
  .comment .body { flex: 1; background: #fff; border-radius: 10px; padding: 8px 12px; }
  .comment .name { font-weight: 600; font-size: 13px; color: #333; }
  .comment .text { font-size: 13px; color: #444; margin-top: 2px; line-height: 1.4; word-break: break-word; }
  .comment .meta { font-size: 11px; color: #999; margin-top: 2px; }
  .comment-form { display: flex; gap: 8px; margin-top: 8px; }
  .comment-form input { font-size: 13px; padding: 8px 10px; }
  .comment-form button { padding: 8px 14px; font-size: 13px; }

  .item {
    background: #f7f7fb; border-radius: 10px; padding: 12px 14px;
    margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
  }
  .item .body { flex: 1; }
  .item .body .name { font-weight: 600; color: #333; font-size: 14px; }
  .item .body .meta { font-size: 12px; color: #888; margin-top: 2px; }
  .item .actions { display: flex; gap: 6px; }

  .empty { color: #999; font-size: 14px; text-align: center; padding: 14px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 640px) { .grid2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<!-- ============ AUTH SCREEN ============ -->
<div class="center" id="authScreen">
  <div class="card">
    <div style="text-align:center;"><span class="badge">Supabase + AES</span></div>
    <div class="tabs">
      <div class="tab active" data-tab="login">Login</div>
      <div class="tab" data-tab="signup">Sign Up</div>
    </div>

    <form class="form active" id="loginForm">
      <h2>Welcome Back</h2>
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" required />
      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" required />
      <button type="submit" class="full" id="loginBtn">Login</button>
      <div class="msg" id="loginMsg"></div>
    </form>

    <form class="form" id="signupForm">
      <h2>Create Account</h2>
      <label for="signupName">Username</label>
      <input type="text" id="signupName" required />
      <label for="signupEmail">Email</label>
      <input type="email" id="signupEmail" required />
      <label for="signupPassword">Password</label>
      <input type="password" id="signupPassword" required minlength="4" />
      <button type="submit" class="full" id="signupBtn">Sign Up</button>
      <div class="msg" id="signupMsg"></div>
    </form>
  </div>
</div>

<!-- ============ APP SCREEN ============ -->
<div class="app" id="appScreen" style="display:none;">
  <!-- Top bar -->
  <div class="topbar">
    <div class="me">
      <div class="avatar" id="topAvatar">?</div>
      <div>
        <h3 id="topUsername">-</h3>
        <small id="topEmail">-</small>
      </div>
    </div>
    <button class="small secondary" id="logoutBtn">Logout</button>
  </div>

  <!-- Post a status -->
  <div class="section">
    <div class="section-head"><h3>Post a Status</h3></div>
    <textarea id="statusInput" placeholder="What's on your mind? (auto-expires in 24h)"></textarea>
    <button class="full" id="postStatusBtn" style="margin-top:10px;">Post</button>
    <div class="msg" id="postStatusMsg"></div>
  </div>

  <!-- My statuses -->
  <div class="section">
    <div class="section-head">
      <h3>My Statuses</h3>
      <span class="count" id="myStatusCount">0</span>
    </div>
    <div id="myStatusList"><div class="empty">Nothing posted yet.</div></div>
  </div>

  <!-- Feed -->
  <div class="section">
    <div class="section-head">
      <h3>Feed (from people I follow)</h3>
      <span class="count" id="feedCount">0</span>
    </div>
    <div id="feedList"><div class="empty">Follow people to see their statuses here.</div></div>
  </div>

  <div class="grid2">
    <!-- Discover users -->
    <div class="section">
      <div class="section-head">
        <h3>Discover Users</h3>
        <span class="count" id="discoverCount">0</span>
      </div>
      <div id="discoverList"><div class="empty">No other users yet.</div></div>
    </div>

    <!-- Incoming follow requests -->
    <div class="section">
      <div class="section-head">
        <h3>Follow Requests</h3>
        <span class="count" id="reqCount">0</span>
      </div>
      <div id="reqList"><div class="empty">No requests right now.</div></div>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  // ===== Supabase =====
  const SUPABASE_URL = 'https://kmaocriozssleperewdw.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_s832F-Dbv5SdHl9GOlbYwA_-8QZoozi';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ===== AES password encryption =====
  const SECRET = 'dynamic1-demo-secret-key-please-change';
  async function getKey() {
    const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(SECRET));
    return crypto.subtle.importKey('raw', hash, { name: 'AES-GCM' }, false, ['encrypt', 'decrypt']);
  }
  function b64(bytes) { let s=''; bytes.forEach(b=>s+=String.fromCharCode(b)); return btoa(s); }
  function fromB64(s) { const bin=atob(s); const a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i); return a; }
  async function encryptPwd(plain) {
    const key = await getKey();
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const c = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, new TextEncoder().encode(plain));
    const combined = new Uint8Array(iv.length + c.byteLength);
    combined.set(iv,0); combined.set(new Uint8Array(c), iv.length);
    return b64(combined);
  }
  async function decryptPwd(enc) {
    const key = await getKey();
    const all = fromB64(enc);
    const iv = all.slice(0,12); const c = all.slice(12);
    return new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, c));
  }

  // ===== State =====
  let currentUser = null;

  // ===== Auth tabs =====
  const tabs = document.querySelectorAll('.tab');
  const forms = document.querySelectorAll('.form');
  tabs.forEach(tab => tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    forms.forEach(f => f.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
    document.getElementById('loginMsg').textContent = '';
    document.getElementById('signupMsg').textContent = '';
  }));

  // ===== Sign up =====
  document.getElementById('signupForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('signupBtn');
    const msg = document.getElementById('signupMsg');
    const username = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim().toLowerCase();
    const password = document.getElementById('signupPassword').value;
    btn.disabled = true; msg.className='msg'; msg.textContent='Encrypting & saving...';
    try {
      const encrypted = await encryptPwd(password);
      const { error } = await supabase.from('app_users').insert({ username, email, password: encrypted });
      btn.disabled = false;
      if (error) {
        msg.className='msg error';
        msg.textContent = error.code === '23505' ? 'Email already registered.' : 'Error: '+error.message;
        return;
      }
      msg.className='msg success'; msg.textContent='Account created! Logging you in...';
      document.getElementById('signupForm').reset();
      setTimeout(() => {
        document.querySelector('.tab[data-tab="login"]').click();
        document.getElementById('loginEmail').value = email;
      }, 700);
    } catch (err) {
      btn.disabled=false; msg.className='msg error'; msg.textContent='Error: '+err.message;
    }
  });

  // ===== Login =====
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const msg = document.getElementById('loginMsg');
    const email = document.getElementById('loginEmail').value.trim().toLowerCase();
    const password = document.getElementById('loginPassword').value;
    btn.disabled = true; msg.className='msg'; msg.textContent='Checking...';

    const { data, error } = await supabase
      .from('app_users')
      .select('id, username, email, password')
      .eq('email', email)
      .maybeSingle();

    btn.disabled = false;
    if (error) { msg.className='msg error'; msg.textContent='Error: '+error.message; return; }
    if (!data) { msg.className='msg error'; msg.textContent='Invalid email or password.'; return; }

    let decrypted;
    try { decrypted = await decryptPwd(data.password); }
    catch { msg.className='msg error'; msg.textContent='Could not decrypt stored password.'; return; }

    if (decrypted !== password) { msg.className='msg error'; msg.textContent='Invalid email or password.'; return; }

    currentUser = { id: data.id, username: data.username, email: data.email };
    sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
    enterApp();
  });

  // ===== Logout =====
  document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('currentUser');
    currentUser = null;
    document.getElementById('appScreen').style.display = 'none';
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('loginForm').reset();
  });

  // ===== Enter app =====
  function enterApp() {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    document.getElementById('topUsername').textContent = currentUser.username;
    document.getElementById('topEmail').textContent = currentUser.email;
    document.getElementById('topAvatar').textContent = currentUser.username.charAt(0).toUpperCase();
    refreshAll();
  }

  // ===== Post a status =====
  document.getElementById('postStatusBtn').addEventListener('click', async () => {
    const content = document.getElementById('statusInput').value.trim();
    const msg = document.getElementById('postStatusMsg');
    if (!content) { msg.className='msg error'; msg.textContent='Type something first.'; return; }
    const { error } = await supabase.from('statuses').insert({ user_id: currentUser.id, content });
    if (error) { msg.className='msg error'; msg.textContent='Error: '+error.message; return; }
    msg.className='msg success'; msg.textContent='Posted!';
    document.getElementById('statusInput').value = '';
    setTimeout(() => msg.textContent='', 1500);
    loadMyStatuses();
  });

  // ===== Helpers =====
  function timeAgo(iso) {
    const s = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (s < 60) return s + 's ago';
    if (s < 3600) return Math.floor(s/60) + 'm ago';
    if (s < 86400) return Math.floor(s/3600) + 'h ago';
    return Math.floor(s/86400) + 'd ago';
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function avatarHtml(name, size='sm') {
    return `<div class="avatar ${size}">${escapeHtml((name||'?').charAt(0).toUpperCase())}</div>`;
  }

  // ===== Refresh everything =====
  async function refreshAll() {
    await Promise.all([
      loadMyStatuses(),
      loadFeed(),
      loadDiscover(),
      loadRequests()
    ]);
  }

  // ===== Likes + comments helpers =====
  // For a set of status IDs, fetch counts of likes, whether I liked each, and comment counts.
  async function fetchEngagement(statusIds) {
    if (!statusIds.length) return { likeCounts:{}, likedByMe:{}, commentCounts:{} };

    const [{ data: likes }, { data: comments }] = await Promise.all([
      supabase.from('status_likes').select('status_id, user_id').in('status_id', statusIds),
      supabase.from('status_comments').select('status_id').in('status_id', statusIds)
    ]);

    const likeCounts = {}, likedByMe = {}, commentCounts = {};
    (likes || []).forEach(l => {
      likeCounts[l.status_id] = (likeCounts[l.status_id] || 0) + 1;
      if (l.user_id === currentUser.id) likedByMe[l.status_id] = true;
    });
    (comments || []).forEach(c => {
      commentCounts[c.status_id] = (commentCounts[c.status_id] || 0) + 1;
    });
    return { likeCounts, likedByMe, commentCounts };
  }

  function renderStatusCard(s, opts) {
    const isMine = opts.isMine;
    const username = opts.username || (isMine ? currentUser.username : 'Unknown');
    const likeCount = opts.likeCount || 0;
    const liked = opts.liked;
    const commentCount = opts.commentCount || 0;
    const editedTag = s.edited_at ? `<span class="edited-tag">(edited)</span>` : '';
    return `
      <div class="status-card" data-card="${s.id}">
        <div class="status-top">
          ${avatarHtml(username, 'sm')}
          <div class="body">
            <div class="name">${isMine ? 'You' : escapeHtml(username)}${editedTag}</div>
            <div class="meta">${timeAgo(s.created_at)}${isMine ? ` · expires ${timeAgo(s.expires_at).replace(' ago',' from now')}` : ''}</div>
          </div>
          ${isMine ? `
            <div style="display:flex; gap:6px;">
              <button class="tiny secondary" data-edit="${s.id}">Edit</button>
              <button class="tiny danger" data-del="${s.id}">Delete</button>
            </div>` : ''}
        </div>
        <div class="status-content" data-content="${s.id}">${escapeHtml(s.content)}</div>
        <div class="status-actions">
          <button class="like-btn ${liked ? 'liked' : ''}" data-like="${s.id}">
            ${liked ? '❤️' : '🤍'} <span data-like-count="${s.id}">${likeCount}</span>
          </button>
          <button class="comment-btn" data-toggle-comments="${s.id}">
            💬 <span data-comment-count="${s.id}">${commentCount}</span>
          </button>
        </div>
        <div class="comments-area" data-comments="${s.id}">
          <div data-comments-list="${s.id}"><div class="empty" style="padding:6px;">Loading...</div></div>
          <div class="comment-form">
            <input type="text" placeholder="Write a comment..." data-comment-input="${s.id}" />
            <button data-comment-send="${s.id}">Send</button>
          </div>
        </div>
      </div>
    `;
  }

  // Hook up like / comment / edit / delete on a container after render
  function bindStatusActions(container) {
    // LIKE toggle
    container.querySelectorAll('[data-like]').forEach(btn => btn.addEventListener('click', async () => {
      const sid = btn.dataset.like;
      const isLiked = btn.classList.contains('liked');
      if (isLiked) {
        await supabase.from('status_likes').delete()
          .eq('status_id', sid).eq('user_id', currentUser.id);
      } else {
        await supabase.from('status_likes').insert({ status_id: sid, user_id: currentUser.id });
      }
      // Update UI in place
      btn.classList.toggle('liked');
      const span = btn.querySelector(`[data-like-count="${sid}"]`);
      const n = parseInt(span.textContent, 10) || 0;
      span.textContent = isLiked ? Math.max(0, n - 1) : n + 1;
      btn.firstChild.textContent = (isLiked ? '🤍' : '❤️') + ' ';
    }));

    // TOGGLE comments
    container.querySelectorAll('[data-toggle-comments]').forEach(btn => btn.addEventListener('click', async () => {
      const sid = btn.dataset.toggleComments;
      const area = container.querySelector(`[data-comments="${sid}"]`);
      const isOpen = area.classList.toggle('open');
      if (isOpen) await loadComments(sid, container);
    }));

    // SEND comment
    container.querySelectorAll('[data-comment-send]').forEach(btn => btn.addEventListener('click', async () => {
      const sid = btn.dataset.commentSend;
      const input = container.querySelector(`[data-comment-input="${sid}"]`);
      const text = input.value.trim();
      if (!text) return;
      btn.disabled = true;
      const { error } = await supabase.from('status_comments').insert({
        status_id: sid, user_id: currentUser.id, content: text
      });
      btn.disabled = false;
      if (error) { alert('Error: '+error.message); return; }
      input.value = '';
      await loadComments(sid, container);
      // bump comment count
      const span = container.querySelector(`[data-comment-count="${sid}"]`);
      span.textContent = (parseInt(span.textContent,10) || 0) + 1;
    }));

    // EDIT (own statuses only)
    container.querySelectorAll('[data-edit]').forEach(btn => btn.addEventListener('click', async () => {
      const sid = btn.dataset.edit;
      const contentEl = container.querySelector(`[data-content="${sid}"]`);
      const oldText = contentEl.textContent;
      const newText = prompt('Edit your status:', oldText);
      if (newText === null) return;
      const trimmed = newText.trim();
      if (!trimmed || trimmed === oldText) return;
      const { error } = await supabase.from('statuses')
        .update({ content: trimmed, edited_at: new Date().toISOString() })
        .eq('id', sid);
      if (error) { alert('Error: '+error.message); return; }
      loadMyStatuses();
    }));

    // DELETE (own statuses only)
    container.querySelectorAll('[data-del]').forEach(btn => btn.addEventListener('click', async () => {
      if (!confirm('Delete this status?')) return;
      await supabase.from('statuses').delete().eq('id', btn.dataset.del);
      loadMyStatuses();
    }));
  }

  async function loadComments(statusId, container) {
    const listEl = container.querySelector(`[data-comments-list="${statusId}"]`);
    const { data, error } = await supabase
      .from('status_comments')
      .select('id, content, created_at, user_id, app_users(username)')
      .eq('status_id', statusId)
      .order('created_at', { ascending: true });
    if (error) { listEl.innerHTML = `<div class="empty">Error: ${escapeHtml(error.message)}</div>`; return; }
    if (!data || data.length === 0) {
      listEl.innerHTML = '<div class="empty" style="padding:6px;">No comments yet. Be first!</div>';
      return;
    }
    listEl.innerHTML = data.map(c => {
      const u = c.app_users?.username || 'Unknown';
      const mine = c.user_id === currentUser.id;
      return `
        <div class="comment">
          ${avatarHtml(u, 'xs')}
          <div class="body">
            <div class="name">${escapeHtml(u)}${mine ? ' (you)' : ''}</div>
            <div class="text">${escapeHtml(c.content)}</div>
            <div class="meta">${timeAgo(c.created_at)}${mine ? ` · <a href="#" data-del-comment="${c.id}">delete</a>` : ''}</div>
          </div>
        </div>
      `;
    }).join('');
    listEl.querySelectorAll('[data-del-comment]').forEach(a => a.addEventListener('click', async e => {
      e.preventDefault();
      await supabase.from('status_comments').delete().eq('id', a.dataset.delComment);
      await loadComments(statusId, container);
      const span = container.querySelector(`[data-comment-count="${statusId}"]`);
      span.textContent = Math.max(0, (parseInt(span.textContent,10) || 0) - 1);
    }));
  }

  // ===== My statuses =====
  async function loadMyStatuses() {
    const { data, error } = await supabase
      .from('statuses')
      .select('id, content, created_at, expires_at, edited_at')
      .eq('user_id', currentUser.id)
      .gt('expires_at', new Date().toISOString())
      .order('created_at', { ascending: false });
    const list = document.getElementById('myStatusList');
    const count = document.getElementById('myStatusCount');
    if (error) { list.innerHTML = `<div class="empty">Error: ${escapeHtml(error.message)}</div>`; return; }
    count.textContent = data.length;
    if (data.length === 0) { list.innerHTML = '<div class="empty">Nothing posted yet.</div>'; return; }

    const ids = data.map(s => s.id);
    const eng = await fetchEngagement(ids);

    list.innerHTML = data.map(s => renderStatusCard(s, {
      isMine: true,
      username: currentUser.username,
      likeCount: eng.likeCounts[s.id] || 0,
      liked: !!eng.likedByMe[s.id],
      commentCount: eng.commentCounts[s.id] || 0
    })).join('');
    bindStatusActions(list);
  }

  // ===== Feed =====
  async function loadFeed() {
    const { data: follows, error: e1 } = await supabase
      .from('follow_requests')
      .select('to_user_id')
      .eq('from_user_id', currentUser.id)
      .eq('status', 'accepted');
    const list = document.getElementById('feedList');
    const count = document.getElementById('feedCount');
    if (e1) { list.innerHTML = `<div class="empty">Error: ${escapeHtml(e1.message)}</div>`; return; }
    const followedIds = follows.map(f => f.to_user_id);
    if (followedIds.length === 0) {
      count.textContent = 0;
      list.innerHTML = '<div class="empty">Follow people to see their statuses here.</div>';
      return;
    }
    const { data: posts, error: e2 } = await supabase
      .from('statuses')
      .select('id, content, created_at, expires_at, edited_at, user_id, app_users(username)')
      .in('user_id', followedIds)
      .gt('expires_at', new Date().toISOString())
      .order('created_at', { ascending: false });
    if (e2) { list.innerHTML = `<div class="empty">Error: ${escapeHtml(e2.message)}</div>`; return; }
    count.textContent = posts.length;
    if (posts.length === 0) {
      list.innerHTML = '<div class="empty">No active statuses from people you follow.</div>';
      return;
    }
    const ids = posts.map(p => p.id);
    const eng = await fetchEngagement(ids);

    list.innerHTML = posts.map(p => renderStatusCard(p, {
      isMine: false,
      username: p.app_users?.username || 'Unknown',
      likeCount: eng.likeCounts[p.id] || 0,
      liked: !!eng.likedByMe[p.id],
      commentCount: eng.commentCounts[p.id] || 0
    })).join('');
    bindStatusActions(list);
  }

  // ===== Discover users =====
  async function loadDiscover() {
    const { data: users } = await supabase
      .from('app_users')
      .select('id, username, email')
      .neq('id', currentUser.id)
      .order('created_at', { ascending: false });
    const { data: sent } = await supabase
      .from('follow_requests')
      .select('to_user_id, status')
      .eq('from_user_id', currentUser.id);
    const sentMap = {};
    (sent || []).forEach(r => sentMap[r.to_user_id] = r.status);

    const list = document.getElementById('discoverList');
    const count = document.getElementById('discoverCount');
    count.textContent = (users || []).length;
    if (!users || users.length === 0) {
      list.innerHTML = '<div class="empty">No other users yet.</div>';
      return;
    }
    list.innerHTML = users.map(u => {
      const status = sentMap[u.id];
      let actionHtml;
      if (status === 'accepted')      actionHtml = `<button class="small secondary" data-unfollow="${u.id}">Unfollow</button>`;
      else if (status === 'pending')  actionHtml = `<button class="small secondary" disabled>Requested</button>`;
      else if (status === 'rejected') actionHtml = `<button class="small" data-follow="${u.id}">Try again</button>`;
      else                            actionHtml = `<button class="small" data-follow="${u.id}">Follow</button>`;
      return `
        <div class="item">
          ${avatarHtml(u.username)}
          <div class="body">
            <div class="name">${escapeHtml(u.username)}</div>
            <div class="meta">${escapeHtml(u.email)}</div>
          </div>
          <div class="actions">${actionHtml}</div>
        </div>
      `;
    }).join('');

    list.querySelectorAll('[data-follow]').forEach(btn => btn.addEventListener('click', async () => {
      const toId = btn.dataset.follow;
      await supabase.from('follow_requests')
        .delete().eq('from_user_id', currentUser.id).eq('to_user_id', toId);
      await supabase.from('follow_requests').insert({
        from_user_id: currentUser.id, to_user_id: toId, status: 'pending'
      });
      loadDiscover();
    }));
    list.querySelectorAll('[data-unfollow]').forEach(btn => btn.addEventListener('click', async () => {
      const toId = btn.dataset.unfollow;
      await supabase.from('follow_requests')
        .delete().eq('from_user_id', currentUser.id).eq('to_user_id', toId);
      loadDiscover();
      loadFeed();
    }));
  }

  // ===== Incoming follow requests =====
  async function loadRequests() {
    const { data: reqs } = await supabase
      .from('follow_requests')
      .select('id, from_user_id, status, created_at, app_users!follow_requests_from_user_id_fkey(username, email)')
      .eq('to_user_id', currentUser.id)
      .eq('status', 'pending')
      .order('created_at', { ascending: false });
    const list = document.getElementById('reqList');
    const count = document.getElementById('reqCount');
    count.textContent = (reqs || []).length;
    if (!reqs || reqs.length === 0) {
      list.innerHTML = '<div class="empty">No requests right now.</div>';
      return;
    }
    list.innerHTML = reqs.map(r => `
      <div class="item">
        ${avatarHtml(r.app_users?.username || '?')}
        <div class="body">
          <div class="name">${escapeHtml(r.app_users?.username || 'Unknown')}</div>
          <div class="meta">${escapeHtml(r.app_users?.email || '')} · ${timeAgo(r.created_at)}</div>
        </div>
        <div class="actions">
          <button class="small success" data-accept="${r.id}">Accept</button>
          <button class="small danger"  data-reject="${r.id}">Reject</button>
        </div>
      </div>
    `).join('');
    list.querySelectorAll('[data-accept]').forEach(btn => btn.addEventListener('click', async () => {
      await supabase.from('follow_requests').update({ status: 'accepted' }).eq('id', btn.dataset.accept);
      loadRequests();
    }));
    list.querySelectorAll('[data-reject]').forEach(btn => btn.addEventListener('click', async () => {
      await supabase.from('follow_requests').update({ status: 'rejected' }).eq('id', btn.dataset.reject);
      loadRequests();
    }));
  }

  // ===== Auto-refresh =====
  setInterval(() => { if (currentUser) { loadFeed(); loadRequests(); } }, 15000);

  // ===== Restore session =====
  const restored = JSON.parse(sessionStorage.getItem('currentUser') || 'null');
  if (restored) { currentUser = restored; enterApp(); }
</script>
</body>
</html>
